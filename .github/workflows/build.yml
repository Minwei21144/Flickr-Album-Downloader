name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "V*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows-x64
            artifact: windows-x64
            release-suffix: windows-x64
            asset-ext: exe
            python-arch: x64
            package-kind: windows
            experimental: false
          - os: windows-latest
            label: Windows-x86
            artifact: windows-x86
            release-suffix: windows-x86
            asset-ext: exe
            python-arch: x86
            package-kind: windows
            experimental: false
          - os: windows-11-arm
            label: Windows-arm64
            artifact: windows-arm64
            release-suffix: windows-arm64
            asset-ext: exe
            python-arch: arm64
            package-kind: windows
            experimental: true
          - os: macos-15-intel
            label: macOS-x64
            artifact: macos-x64
            release-suffix: macos-x64
            asset-ext: dmg
            python-arch: x64
            package-kind: macos
            experimental: false
          - os: macos-15
            label: macOS-arm64
            artifact: macos-arm64
            release-suffix: macos-arm64
            asset-ext: dmg
            python-arch: arm64
            package-kind: macos
            experimental: false
          - os: ubuntu-latest
            label: Linux-x64
            artifact: linux-x64
            release-suffix: linux-x64
            asset-ext: AppImage
            python-arch: x64
            package-kind: linux
            experimental: false
          - os: ubuntu-24.04-arm
            label: Linux-arm64
            artifact: linux-arm64
            release-suffix: linux-arm64
            asset-ext: AppImage
            python-arch: arm64
            package-kind: linux
            experimental: true

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-arch }}

      - name: Set release metadata
        shell: pwsh
        run: |
          $version = python -c "from app_metadata import APP_VERSION; print(APP_VERSION)"
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_SLUG=FlickrAlbumDownloader" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Generate icon assets
        run: python tools/generate_icons.py

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          mkdir -p assets/icon.iconset
          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" assets/icon.png --out "assets/icon.iconset/icon_${size}x${size}.png"
            double_size=$((size * 2))
            sips -z "$double_size" "$double_size" assets/icon.png --out "assets/icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Build Windows executable
        if: matrix.package-kind == 'windows'
        shell: pwsh
        run: .\build_windows.ps1 -Python python -Name "Flickr Album Downloader"

      - name: Build macOS app
        if: matrix.package-kind == 'macos'
        run: |
          python -m PyInstaller \
            --clean \
            -y \
            --windowed \
            --name "Flickr Album Downloader" \
            --icon assets/icon.icns \
            --osx-bundle-identifier "io.github.minwei21144.flickr-album-downloader" \
            --add-data "assets/icon.png:assets" \
            --add-data "assets/icon.ico:assets" \
            flickr_album_downloader.py
          python tools/update_macos_info_plist.py "dist/Flickr Album Downloader.app/Contents/Info.plist"
          xattr -cr "dist/Flickr Album Downloader.app" || true
          codesign --force --deep --sign - "dist/Flickr Album Downloader.app"
          codesign --verify --deep --strict "dist/Flickr Album Downloader.app"

      - name: Build Linux executable
        if: matrix.package-kind == 'linux'
        run: |
          python -m PyInstaller \
            --clean \
            -y \
            --name "Flickr Album Downloader" \
            --icon assets/icon.png \
            --add-data "assets/icon.png:assets" \
            --add-data "assets/icon.ico:assets" \
            flickr_album_downloader.py

      - name: Package Windows artifact
        if: matrix.package-kind == 'windows'
        shell: pwsh
        run: |
          $assetName = "$env:APP_SLUG-$env:APP_VERSION-${{ matrix.release-suffix }}.exe"
          Copy-Item "dist\Flickr Album Downloader.exe" "dist\$assetName" -Force

      - name: Package macOS DMG
        if: matrix.package-kind == 'macos'
        run: |
          asset_name="$APP_SLUG-$APP_VERSION-${{ matrix.release-suffix }}.dmg"
          dmg_root="dist/dmg-root"
          rm -rf "$dmg_root"
          mkdir -p "$dmg_root"
          cp -R "dist/Flickr Album Downloader.app" "$dmg_root/"
          ln -s /Applications "$dmg_root/Applications"
          hdiutil create \
            -volname "Flickr Album Downloader" \
            -srcfolder "$dmg_root" \
            -ov \
            -format UDZO \
            "dist/$asset_name"
          codesign --force --sign - "dist/$asset_name" || true

      - name: Package Linux AppImage
        if: matrix.package-kind == 'linux'
        run: |
          chmod +x "dist/Flickr Album Downloader/Flickr Album Downloader"
          asset_name="$APP_SLUG-$APP_VERSION-${{ matrix.release-suffix }}.AppImage"
          appdir="dist/FlickrAlbumDownloader.AppDir"
          rm -rf "$appdir"
          mkdir -p "$appdir/usr/bin" "$appdir/usr/share/applications" "$appdir/usr/share/icons/hicolor/256x256/apps" "$appdir/usr/share/doc/flickr-album-downloader"
          cp -R "dist/Flickr Album Downloader" "$appdir/usr/bin/Flickr Album Downloader"
          cp assets/icon.png "$appdir/flickr-album-downloader.png"
          cp assets/icon.png "$appdir/usr/share/icons/hicolor/256x256/apps/flickr-album-downloader.png"
          cp LICENSE "$appdir/usr/share/doc/flickr-album-downloader/LICENSE"
          cp THIRD_PARTY_NOTICES.md "$appdir/usr/share/doc/flickr-album-downloader/THIRD_PARTY_NOTICES.md"
          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=Flickr Album Downloader' \
            'Exec=AppRun' \
            'Icon=flickr-album-downloader' \
            'Categories=Network;Graphics;' \
            'Terminal=false' \
            > "$appdir/flickr-album-downloader.desktop"
          printf '%s\n' \
            '#!/bin/sh' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            'exec "$HERE/usr/bin/Flickr Album Downloader/Flickr Album Downloader" "$@"' \
            > "$appdir/AppRun"
          chmod +x "$appdir/AppRun" "$appdir/usr/bin/Flickr Album Downloader/Flickr Album Downloader"
          case "${{ matrix.release-suffix }}" in
            linux-x64)
              tool_arch="x86_64"
              appimage_arch="x86_64"
              ;;
            linux-arm64)
              tool_arch="aarch64"
              appimage_arch="aarch64"
              ;;
            *)
              echo "Unsupported Linux AppImage architecture: ${{ matrix.release-suffix }}" >&2
              exit 1
              ;;
          esac
          curl -L -o appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${tool_arch}.AppImage"
          chmod +x appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH="$appimage_arch" ./appimagetool "$appdir" "dist/$asset_name"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/FlickrAlbumDownloader-*-${{ matrix.release-suffix }}.${{ matrix.asset-ext }}

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.AppImage
