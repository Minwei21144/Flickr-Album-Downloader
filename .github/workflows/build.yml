name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "V*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows-x64
            artifact: windows-x64
            release-suffix: windows-x64
            asset-ext: exe
            python-arch: x64
            package-kind: windows
            experimental: false
          - os: windows-latest
            label: Windows-x86
            artifact: windows-x86
            release-suffix: windows-x86
            asset-ext: exe
            python-arch: x86
            package-kind: windows
            experimental: false
          - os: windows-11-arm
            label: Windows-arm64
            artifact: windows-arm64
            release-suffix: windows-arm64
            asset-ext: exe
            python-arch: arm64
            package-kind: windows
            experimental: true
          - os: macos-15-intel
            label: macOS-x64
            artifact: macos-x64
            release-suffix: macos-x64
            asset-ext: dmg
            python-arch: x64
            package-kind: macos
            experimental: false
          - os: macos-15
            label: macOS-arm64
            artifact: macos-arm64
            release-suffix: macos-arm64
            asset-ext: dmg
            python-arch: arm64
            package-kind: macos
            experimental: false
          - os: ubuntu-latest
            label: Linux-x64
            artifact: linux-x64
            release-suffix: linux-x64
            asset-ext: AppImage
            python-arch: x64
            package-kind: linux
            experimental: false
          - os: ubuntu-24.04-arm
            label: Linux-arm64
            artifact: linux-arm64
            release-suffix: linux-arm64
            asset-ext: AppImage
            python-arch: arm64
            package-kind: linux
            experimental: true

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-arch }}

      - name: Set release metadata
        shell: pwsh
        run: |
          $version = python -c "from app_metadata import APP_VERSION; print(APP_VERSION)"
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_SLUG=FlickrAlbumDownloader" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Generate icon assets
        run: python tools/generate_icons.py

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          mkdir -p assets/icon.iconset
          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" assets/icon.png --out "assets/icon.iconset/icon_${size}x${size}.png"
            double_size=$((size * 2))
            sips -z "$double_size" "$double_size" assets/icon.png --out "assets/icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Check macOS notarization configuration
        if: matrix.package-kind == 'macos'
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          missing=()
          for name in \
            APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_PRIVATE_KEY
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ ${#missing[@]} -eq 0 ]; then
            echo "MACOS_NOTARIZATION_ENABLED=true" >> "$GITHUB_ENV"
            echo "macOS notarization is enabled for this build."
          else
            echo "MACOS_NOTARIZATION_ENABLED=false" >> "$GITHUB_ENV"
            printf 'macOS notarization is disabled; missing secrets: %s\n' "${missing[*]}"
          fi

      - name: Import Apple Developer ID certificate
        if: matrix.package-kind == 'macos' && env.MACOS_NOTARIZATION_ENABLED == 'true'
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          certificate_path="$RUNNER_TEMP/developer_id_application.p12"
          keychain_path="$RUNNER_TEMP/flickr-album-downloader-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"

          printf '%s' "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          if [ -z "$APPLE_CODESIGN_IDENTITY" ]; then
            APPLE_CODESIGN_IDENTITY="$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          fi

          if [ -z "$APPLE_CODESIGN_IDENTITY" ]; then
            echo "No Developer ID Application signing identity was found." >&2
            security find-identity -v -p codesigning "$keychain_path"
            exit 1
          fi

          printf 'APPLE_CODESIGN_IDENTITY=%s\n' "$APPLE_CODESIGN_IDENTITY" >> "$GITHUB_ENV"
          printf 'MACOS_SIGNING_KEYCHAIN=%s\n' "$keychain_path" >> "$GITHUB_ENV"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build Windows executable
        if: matrix.package-kind == 'windows'
        shell: pwsh
        run: .\build_windows.ps1 -Python python -Name "Flickr Album Downloader"

      - name: Build macOS app
        if: matrix.package-kind == 'macos'
        run: |
          python -m PyInstaller \
            --clean \
            -y \
            --windowed \
            --name "Flickr Album Downloader" \
            --icon assets/icon.icns \
            --osx-bundle-identifier "io.github.minwei21144.flickr-album-downloader" \
            --add-data "assets/icon.png:assets" \
            --add-data "assets/icon.ico:assets" \
            flickr_album_downloader.py
          python tools/update_macos_info_plist.py "dist/Flickr Album Downloader.app/Contents/Info.plist"
          xattr -cr "dist/Flickr Album Downloader.app" || true
          if [ "${MACOS_NOTARIZATION_ENABLED:-false}" = "true" ]; then
            codesign --force --deep \
              --options runtime \
              --timestamp \
              --entitlements packaging/macos/entitlements.plist \
              --keychain "$MACOS_SIGNING_KEYCHAIN" \
              --sign "$APPLE_CODESIGN_IDENTITY" \
              "dist/Flickr Album Downloader.app"
          else
            codesign --force --deep --sign - "dist/Flickr Album Downloader.app"
          fi
          codesign --verify --deep --strict "dist/Flickr Album Downloader.app"

      - name: Build Linux executable
        if: matrix.package-kind == 'linux'
        run: |
          python -m PyInstaller \
            --clean \
            -y \
            --name "Flickr Album Downloader" \
            --icon assets/icon.png \
            --add-data "assets/icon.png:assets" \
            --add-data "assets/icon.ico:assets" \
            flickr_album_downloader.py

      - name: Package Windows artifact
        if: matrix.package-kind == 'windows'
        shell: pwsh
        run: |
          $assetName = "$env:APP_SLUG-$env:APP_VERSION-${{ matrix.release-suffix }}.exe"
          Copy-Item "dist\Flickr Album Downloader.exe" "dist\$assetName" -Force

      - name: Package macOS DMG
        if: matrix.package-kind == 'macos'
        run: |
          asset_name="$APP_SLUG-$APP_VERSION-${{ matrix.release-suffix }}.dmg"
          dmg_root="dist/dmg-root"
          rm -rf "$dmg_root"
          mkdir -p "$dmg_root"
          cp -R "dist/Flickr Album Downloader.app" "$dmg_root/"
          ln -s /Applications "$dmg_root/Applications"
          hdiutil create \
            -volname "Flickr Album Downloader" \
            -srcfolder "$dmg_root" \
            -ov \
            -format UDZO \
            "dist/$asset_name"
          if [ "${MACOS_NOTARIZATION_ENABLED:-false}" = "true" ]; then
            codesign --force --timestamp --keychain "$MACOS_SIGNING_KEYCHAIN" --sign "$APPLE_CODESIGN_IDENTITY" "dist/$asset_name"
          else
            codesign --force --sign - "dist/$asset_name" || true
          fi

      - name: Notarize macOS DMG
        if: matrix.package-kind == 'macos' && env.MACOS_NOTARIZATION_ENABLED == 'true'
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          asset_name="$APP_SLUG-$APP_VERSION-${{ matrix.release-suffix }}.dmg"
          private_key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$private_key_path"

          xcrun notarytool submit "dist/$asset_name" \
            --key "$private_key_path" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait
          xcrun stapler staple "dist/$asset_name"
          xcrun stapler validate "dist/$asset_name"
          spctl -a -vvv -t open --context context:primary-signature "dist/$asset_name"

      - name: Package Linux AppImage
        if: matrix.package-kind == 'linux'
        run: |
          chmod +x "dist/Flickr Album Downloader/Flickr Album Downloader"
          asset_name="$APP_SLUG-$APP_VERSION-${{ matrix.release-suffix }}.AppImage"
          appdir="dist/FlickrAlbumDownloader.AppDir"
          rm -rf "$appdir"
          mkdir -p "$appdir/usr/bin" "$appdir/usr/share/applications" "$appdir/usr/share/icons/hicolor/256x256/apps" "$appdir/usr/share/doc/flickr-album-downloader"
          cp -R "dist/Flickr Album Downloader" "$appdir/usr/bin/Flickr Album Downloader"
          cp assets/icon.png "$appdir/flickr-album-downloader.png"
          cp assets/icon.png "$appdir/usr/share/icons/hicolor/256x256/apps/flickr-album-downloader.png"
          cp LICENSE "$appdir/usr/share/doc/flickr-album-downloader/LICENSE"
          cp THIRD_PARTY_NOTICES.md "$appdir/usr/share/doc/flickr-album-downloader/THIRD_PARTY_NOTICES.md"
          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=Flickr Album Downloader' \
            'Exec=AppRun' \
            'Icon=flickr-album-downloader' \
            'Categories=Network;Graphics;' \
            'Terminal=false' \
            > "$appdir/flickr-album-downloader.desktop"
          printf '%s\n' \
            '#!/bin/sh' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            'exec "$HERE/usr/bin/Flickr Album Downloader/Flickr Album Downloader" "$@"' \
            > "$appdir/AppRun"
          chmod +x "$appdir/AppRun" "$appdir/usr/bin/Flickr Album Downloader/Flickr Album Downloader"
          case "${{ matrix.release-suffix }}" in
            linux-x64)
              tool_arch="x86_64"
              appimage_arch="x86_64"
              ;;
            linux-arm64)
              tool_arch="aarch64"
              appimage_arch="aarch64"
              ;;
            *)
              echo "Unsupported Linux AppImage architecture: ${{ matrix.release-suffix }}" >&2
              exit 1
              ;;
          esac
          curl -L -o appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${tool_arch}.AppImage"
          chmod +x appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH="$appimage_arch" ./appimagetool "$appdir" "dist/$asset_name"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/FlickrAlbumDownloader-*-${{ matrix.release-suffix }}.${{ matrix.asset-ext }}

      - name: Clean up macOS signing keychain
        if: always() && matrix.package-kind == 'macos' && env.MACOS_NOTARIZATION_ENABLED == 'true'
        run: |
          security delete-keychain "$MACOS_SIGNING_KEYCHAIN" || true
          rm -f "$RUNNER_TEMP/developer_id_application.p12" "$RUNNER_TEMP"/AuthKey_*.p8

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.AppImage
