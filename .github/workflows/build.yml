name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "V*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows-x64
            artifact: Flickr Album Downloader-Windows-x64
            python-arch: x64
            package-kind: windows
            experimental: false
          - os: windows-latest
            label: Windows-x86
            artifact: Flickr Album Downloader-Windows-x86
            python-arch: x86
            package-kind: windows
            experimental: false
          - os: windows-11-arm
            label: Windows-arm64
            artifact: Flickr Album Downloader-Windows-arm64
            python-arch: arm64
            package-kind: windows
            experimental: true
          - os: macos-15-intel
            label: macOS-x64
            artifact: Flickr Album Downloader-macOS-x64
            python-arch: x64
            package-kind: macos
            experimental: false
          - os: macos-15
            label: macOS-arm64
            artifact: Flickr Album Downloader-macOS-arm64
            python-arch: arm64
            package-kind: macos
            experimental: false
          - os: ubuntu-latest
            label: Linux-x64
            artifact: Flickr Album Downloader-Linux-x64
            python-arch: x64
            package-kind: linux
            experimental: false
          - os: ubuntu-24.04-arm
            label: Linux-arm64
            artifact: Flickr Album Downloader-Linux-arm64
            python-arch: arm64
            package-kind: linux
            experimental: true

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-arch }}

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Generate icon assets
        run: python tools/generate_icons.py

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          mkdir -p assets/icon.iconset
          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" assets/icon.png --out "assets/icon.iconset/icon_${size}x${size}.png"
            double_size=$((size * 2))
            sips -z "$double_size" "$double_size" assets/icon.png --out "assets/icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Build Windows executable
        if: matrix.package-kind == 'windows'
        shell: pwsh
        run: .\build_windows.ps1 -Python python -Name "Flickr Album Downloader"

      - name: Build macOS app
        if: matrix.package-kind == 'macos'
        run: |
          python -m PyInstaller \
            --clean \
            -y \
            --onefile \
            --windowed \
            --name "Flickr Album Downloader" \
            --icon assets/icon.icns \
            --osx-bundle-identifier "io.github.minwei21144.flickr-album-downloader" \
            --add-data "assets/icon.png:assets" \
            --add-data "assets/icon.ico:assets" \
            flickr_album_downloader.py
          python tools/update_macos_info_plist.py "dist/Flickr Album Downloader.app/Contents/Info.plist"

      - name: Build Linux executable
        if: matrix.package-kind == 'linux'
        run: |
          python -m PyInstaller \
            --clean \
            -y \
            --onefile \
            --name "Flickr Album Downloader" \
            --icon assets/icon.png \
            --add-data "assets/icon.png:assets" \
            --add-data "assets/icon.ico:assets" \
            flickr_album_downloader.py

      - name: Package Windows artifact
        if: matrix.package-kind == 'windows'
        shell: pwsh
        run: |
          $packageDir = "dist\${{ matrix.artifact }}"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "dist\Flickr Album Downloader.exe" $packageDir
          Copy-Item "LICENSE" $packageDir
          Copy-Item "THIRD_PARTY_NOTICES.md" $packageDir
          Compress-Archive -Path "$packageDir\*" -DestinationPath "dist\${{ matrix.artifact }}.zip" -Force

      - name: Package macOS artifact
        if: matrix.package-kind == 'macos'
        run: |
          package_dir="dist/${{ matrix.artifact }}"
          mkdir -p "$package_dir"
          cp -R "dist/Flickr Album Downloader.app" "$package_dir/"
          cp LICENSE "$package_dir/"
          cp THIRD_PARTY_NOTICES.md "$package_dir/"
          ditto -c -k --sequesterRsrc --keepParent "$package_dir" "dist/${{ matrix.artifact }}.zip"

      - name: Package Linux artifact
        if: matrix.package-kind == 'linux'
        run: |
          chmod +x "dist/Flickr Album Downloader"
          package_dir="dist/${{ matrix.artifact }}"
          mkdir -p "$package_dir"
          cp "dist/Flickr Album Downloader" "$package_dir/"
          cp LICENSE "$package_dir/"
          cp THIRD_PARTY_NOTICES.md "$package_dir/"
          cd dist
          zip -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.zip
